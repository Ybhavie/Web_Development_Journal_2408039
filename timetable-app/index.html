<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Timetable OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/components.css"/>
</head>
<body>
  <div class="scanline"></div>
  <div class="noise"></div>

  <!-- Mobile top bar -->
  <header class="mobile-topbar">
    <div class="mobile-brand">
      <div class="brand-icon-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
          <circle cx="12" cy="16" r="2" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span>Timetable<b>OS</b></span>
    </div>
    <div class="mobile-clock" id="mobile-clock-display"></div>
  </header>

  <!-- Sidebar overlay backdrop -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
          <circle cx="12" cy="16" r="2" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Timetable<span>OS</span></div>
        <div class="brand-sub">Academic Scheduler</div>
      </div>
      <button class="sidebar-close-btn" onclick="closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-view="today" onclick="switchView('today');closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Today's Classes
      </a>
      <a class="nav-item" data-view="week" onclick="switchView('week');closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Weekly View
      </a>
      <a class="nav-item" data-view="manage" onclick="switchView('manage');closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Manage Slots
      </a>
    </nav>

    <div class="sidebar-clock">
      <div class="clock-time" id="sidebar-clock"></div>
      <div class="clock-date" id="sidebar-date"></div>
    </div>
  </aside>

  <main class="main-content">
    <!-- TODAY VIEW -->
    <section class="view active" id="view-today">
      <header class="view-header">
        <div>
          <h1 class="view-title">Today's Schedule</h1>
          <p class="view-subtitle" id="today-subtitle">Loading...</p>
        </div>
        <div class="header-stats" id="today-stats"></div>
      </header>
      <div class="today-timeline" id="today-timeline">
        <div class="empty-state" id="today-empty" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <p>No classes scheduled for today.</p>
          <button onclick="switchView('manage')" class="btn btn-primary">Add a Slot</button>
        </div>
      </div>
    </section>

    <!-- WEEK VIEW -->
    <section class="view" id="view-week">
      <header class="view-header">
        <div>
          <h1 class="view-title">Weekly Overview</h1>
          <p class="view-subtitle">Full schedule at a glance</p>
        </div>
      </header>
      <div class="week-grid" id="week-grid"></div>
    </section>

    <!-- MANAGE VIEW -->
    <section class="view" id="view-manage">
      <header class="view-header">
        <div>
          <h1 class="view-title">Manage Slots</h1>
          <p class="view-subtitle">Add, edit, or remove class entries</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Slot
        </button>
      </header>

      <!-- Mobile card list (shown on small screens) -->
      <div class="manage-cards" id="manage-cards"></div>

      <!-- Desktop table (hidden on small screens) -->
      <div class="manage-table-wrap">
        <table class="manage-table">
          <thead>
            <tr><th>Subject</th><th>Day</th><th>Time</th><th>Room</th><th>Actions</th></tr>
          </thead>
          <tbody id="manage-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item active" data-view="today" onclick="switchView('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Today</span>
    </button>
    <button class="bottom-nav-item" data-view="week" onclick="switchView('week')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Week</span>
    </button>
    <button class="bottom-nav-item" data-view="manage" onclick="switchView('manage')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Manage</span>
    </button>
  </nav>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Add New Slot</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="slot-form" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="f-id"/>
        <div class="form-grid">
          <div class="form-group full">
            <label>Subject / Course</label>
            <input type="text" id="f-subject" placeholder="e.g. Quantum Mechanics" required/>
          </div>
          <div class="form-group">
            <label>Day</label>
            <select id="f-day" required>
              <option value="">Select day</option>
              <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
              <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
            </select>
          </div>
          <div class="form-group">
            <label>Room / Location</label>
            <input type="text" id="f-room" placeholder="e.g. Hall A-102"/>
          </div>
          <div class="form-group">
            <label>Start Time</label>
            <input type="time" id="f-start" required/>
          </div>
          <div class="form-group">
            <label>End Time</label>
            <input type="time" id="f-end" required/>
          </div>
          <div class="form-group full">
            <label>Notes (optional)</label>
            <input type="text" id="f-notes" placeholder="e.g. Bring lab manuals"/>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Slot</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
