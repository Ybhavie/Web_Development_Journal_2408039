<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Requirement: Create an HTML page (Q1-A) -->
    <title>Question 1 - Roll No 2408039</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Question 1: HTML and JavaScript</h2>

    <!-- PART A: DOM Manipulation Requirements (Q1-A-a,b) -->
    <section>
        <h3>Part A: Dynamic List (DOM)</h3>
        <!-- (a) Add an input box and a button -->
        <input type="text" id="itemInput" placeholder="Enter text here">
        <button onclick="addItem()">Add to List</button>
        
        <p><small>*Requirement (c): Click an item to remove it.</small></p>
        <!-- The list container for dynamic items -->
        <ul id="itemList"></ul>
    </section>

    <!-- PART B: JavaScript Program Requirements (Q1-B-a,f) -->
    <section>
        <h3>Part B: String Analysis</h3>
        <!-- (a) Accept a string input -->
        <input type="text" id="stringInput" placeholder="Enter a string">
        <button onclick="analyzeString()">Analyze String</button>
        
        <!-- (f) Show output dynamically on the webpage -->
        <div class="result-box" id="stringOutput">
            Output will appear here...
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
