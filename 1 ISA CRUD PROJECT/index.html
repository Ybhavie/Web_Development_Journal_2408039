<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Student Data Portal</h1>
        
        <div class="card">
            <form id="studentForm">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="input-group">
                    <input type="text" id="name" placeholder="Full Name" required>
                    <input type="number" id="rollNum" placeholder="Roll Number" required>
                    <input type="text" id="studentClass" placeholder="Class (e.g. SYBCA)" required>
                </div>
                
                <button type="submit" id="submitBtn">Add Student</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll No.</th>
                        <th>Class</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
